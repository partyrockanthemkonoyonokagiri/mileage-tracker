<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>走行距離記録</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ログイン画面 -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-box">
      <h1>走行距離記録</h1>
      <div class="auth-tabs">
        <button class="auth-tab-btn active" data-auth="login">ログイン</button>
        <button class="auth-tab-btn" data-auth="register">新規登録</button>
      </div>
      <form id="auth-form">
        <div class="field">
          <label for="a-email">メールアドレス</label>
          <input type="email" id="a-email" required placeholder="example@email.com">
        </div>
        <div class="field">
          <label for="a-password">パスワード</label>
          <input type="password" id="a-password" required placeholder="6文字以上">
        </div>
        <button type="submit" class="btn-primary" id="auth-submit">ログイン</button>
        <div class="auth-divider"><span>または</span></div>
        <button type="button" class="btn-google" id="btn-google-login">
          <svg width="18" height="18" viewbox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Googleでログイン
        </button>
        <p id="auth-error" class="auth-error"></p>
      </form>
    </div>
  </div>

  <!-- メイン画面 -->
  <div id="app-screen" class="hidden">
  <header>
    <h1>走行距離記録</h1>
    <button id="btn-logout" class="btn-logout">ログアウト</button>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="input">入力</button>
    <button class="tab-btn" data-tab="records">記録一覧</button>
    <button class="tab-btn" data-tab="summary">サマリー</button>
  </nav>

  <main>
    <!-- 入力タブ -->
    <section id="tab-input" class="tab-pane active">
      <form id="entry-form">
        <div class="field">
          <div class="date-label-row">
            <label for="f-date">日付</label>
            <label class="toggle-label">
              <input type="checkbox" id="f-range-toggle">
              <span>期間で入力</span>
            </label>
          </div>
          <div class="date-range-row">
            <input type="date" id="f-date" required>
            <span class="date-sep hidden" id="f-sep">〜</span>
            <input type="date" id="f-date-end" class="hidden">
          </div>
        </div>
        <div class="field">
          <label>用途</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="type" value="private" checked>
              <span>プライベート</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="type" value="business">
              <span>事業用</span>
            </label>
          </div>
        </div>
        <div class="field">
          <label for="f-start">スタート総走行距離 (km)</label>
          <input type="number" id="f-start" min="0" step="0.1" placeholder="0" required>
        </div>
        <div class="field">
          <label for="f-end">終了総走行距離 (km)</label>
          <input type="number" id="f-end" min="0" step="0.1" placeholder="0" required>
        </div>
        <div class="field">
          <label for="f-distance">走行距離 (km)</label>
          <input type="number" id="f-distance" readonly class="readonly">
        </div>
        <div class="field">
          <label for="f-route">経路 <span class="optional">任意</span></label>
          <input type="text" id="f-route" placeholder="例：自宅 → 客先">
        </div>
        <div class="field">
          <label for="f-memo">メモ <span class="optional">任意</span></label>
          <textarea id="f-memo" rows="2" placeholder="メモを入力"></textarea>
        </div>
        <button type="submit" class="btn-primary">保存</button>
      </form>
    </section>

    <!-- 記録一覧タブ -->
    <section id="tab-records" class="tab-pane">
      <div class="filter-bar">
        <input type="month" id="r-month">
        <select id="r-type">
          <option value="all">すべて</option>
          <option value="private">プライベート</option>
          <option value="business">事業用</option>
        </select>
      </div>
      <div id="records-total" class="records-total"></div>
      <div id="records-container">
        <p class="loading">読み込み中...</p>
      </div>
    </section>

    <!-- サマリータブ -->
    <section id="tab-summary" class="tab-pane">
      <div class="filter-bar">
        <select id="s-year"></select>
      </div>
      <div id="summary-container">
        <p class="loading">読み込み中...</p>
      </div>
    </section>
  </main>

  <!-- 編集モーダル -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-overlay"></div>
    <div class="modal-box">
      <h2>記録を編集</h2>
      <form id="edit-form">
        <input type="hidden" id="e-id">
        <div class="field">
          <div class="date-label-row">
            <label for="e-date">日付</label>
            <label class="toggle-label">
              <input type="checkbox" id="e-range-toggle">
              <span>期間で入力</span>
            </label>
          </div>
          <div class="date-range-row">
            <input type="date" id="e-date" required>
            <span class="date-sep hidden" id="e-sep">〜</span>
            <input type="date" id="e-date-end" class="hidden">
          </div>
        </div>
        <div class="field">
          <label>用途</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="e-type" value="private">
              <span>プライベート</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="e-type" value="business">
              <span>事業用</span>
            </label>
          </div>
        </div>
        <div class="field">
          <label for="e-start">スタート総走行距離 (km)</label>
          <input type="number" id="e-start" min="0" step="0.1" required>
        </div>
        <div class="field">
          <label for="e-end">終了総走行距離 (km)</label>
          <input type="number" id="e-end" min="0" step="0.1" required>
        </div>
        <div class="field">
          <label for="e-distance">走行距離 (km)</label>
          <input type="number" id="e-distance" readonly class="readonly">
        </div>
        <div class="field">
          <label for="e-route">経路 <span class="optional">任意</span></label>
          <input type="text" id="e-route">
        </div>
        <div class="field">
          <label for="e-memo">メモ <span class="optional">任意</span></label>
          <textarea id="e-memo" rows="2"></textarea>
        </div>
        <div class="modal-actions">
          <button type="submit" class="btn-primary">保存</button>
          <button type="button" id="modal-cancel" class="btn-secondary">キャンセル</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  </div><!-- /#app-screen -->

  <script type="module" src="app.js"></script>
</body>
</html>
