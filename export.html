<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>データエクスポート</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #2563eb; --danger: #ef4444; --border: #e2e8f0;
      --bg: #f1f5f9; --text: #1e293b; --muted: #64748b;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100dvh; display: flex; align-items: center; justify-content: center;
      padding: 24px 16px;
    }
    .box {
      background: white; border-radius: 12px; padding: 28px 24px;
      width: 100%; max-width: 400px; box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    h1 { font-size: 1.2rem; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
    .sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 24px; }
    label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 6px; }
    input[type="email"], input[type="password"] {
      width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 1rem; margin-bottom: 12px;
    }
    input:focus { outline: none; border-color: var(--primary); }
    .btn {
      width: 100%; padding: 11px; border-radius: 8px; font-size: 0.95rem;
      font-weight: 500; cursor: pointer; border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: background 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .btn-primary { background: var(--primary); color: white; border-color: var(--primary); margin-bottom: 10px; }
    .btn-primary:hover:not(:disabled) { background: #1d4ed8; }
    .btn-google  { background: white; color: var(--text); margin-bottom: 0; }
    .btn-google:hover { background: var(--bg); }
    .divider {
      display: flex; align-items: center; gap: 10px;
      color: var(--muted); font-size: 0.8rem; margin: 14px 0;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .auth-section { margin-bottom: 0; }
    .export-section { display: none; }
    .user-info { font-size: 0.8rem; color: var(--muted); margin-bottom: 16px; }
    .btn-row { display: flex; gap: 10px; margin-bottom: 0; }
    .btn-row .btn { flex: 1; }
    #status { margin-top: 14px; font-size: 0.875rem; color: var(--muted); min-height: 20px; text-align: center; }
    .error { color: var(--danger); }
  </style>
</head>
<body>
<div class="box">
  <h1>データエクスポート</h1>
  <p class="sub">ログインして自分のデータをダウンロードします</p>

  <div id="auth-section" class="auth-section">
    <label for="e-email">メールアドレス</label>
    <input type="email" id="e-email" placeholder="example@email.com">
    <label for="e-password">パスワード</label>
    <input type="password" id="e-password" placeholder="パスワード">
    <button class="btn btn-primary" id="btn-login">ログイン</button>
    <div class="divider">または</div>
    <button class="btn btn-google" id="btn-google-login">
      <svg width="18" height="18" viewbox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Googleでログイン
    </button>
  </div>

  <div id="export-section" class="export-section">
    <p class="user-info" id="user-info"></p>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-json">JSON</button>
      <button class="btn btn-primary" id="btn-csv">CSV</button>
    </div>
  </div>

  <div id="status"></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, collection, getDocs, query, orderBy }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

const firebaseConfig = {
  apiKey:            "AIzaSyAkqjQHT0iX7QCBts_pmkhaOWXNWY7V25U",
  authDomain:        "mileage-tracker-1dd8f.firebaseapp.com",
  projectId:         "mileage-tracker-1dd8f",
  storageBucket:     "mileage-tracker-1dd8f.firebasestorage.app",
  messagingSenderId: "747490982242",
  appId:             "1:747490982242:web:7a93e86a45eb9d1105543b"
};

const appFb      = initializeApp(firebaseConfig);
const db         = getFirestore(appFb);
const auth       = getAuth(appFb);
const statusEl   = document.getElementById('status');
const authSection   = document.getElementById('auth-section');
const exportSection = document.getElementById('export-section');
const userInfoEl    = document.getElementById('user-info');
let currentUid = null;

function onLoginSuccess(user) {
  currentUid = user.uid;
  authSection.style.display   = 'none';
  exportSection.style.display = 'block';
  userInfoEl.textContent = `ログイン中: ${user.email}`;
}

document.getElementById('btn-login').addEventListener('click', async () => {
  statusEl.textContent = '';
  try {
    const cred = await signInWithEmailAndPassword(
      auth,
      document.getElementById('e-email').value,
      document.getElementById('e-password').value
    );
    onLoginSuccess(cred.user);
  } catch {
    statusEl.innerHTML = `<span class="error">ログインに失敗しました</span>`;
  }
});

document.getElementById('btn-google-login').addEventListener('click', async () => {
  statusEl.textContent = '';
  try {
    const cred = await signInWithPopup(auth, new GoogleAuthProvider());
    onLoginSuccess(cred.user);
  } catch (e) {
    if (e.code !== 'auth/popup-closed-by-user') {
      statusEl.innerHTML = `<span class="error">Googleログインに失敗しました</span>`;
    }
  }
});

async function fetchAll() {
  statusEl.textContent = '読み込み中...';
  const q    = query(collection(db, 'users', currentUid, 'mileage_records'), orderBy('date', 'asc'));
  const snap = await getDocs(q);
  const records = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  statusEl.textContent = `${records.length} 件取得しました`;
  return records;
}

function download(content, filename, type) {
  const blob = new Blob([content], { type });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

document.getElementById('btn-json').addEventListener('click', async () => {
  try {
    const records = await fetchAll();
    download(JSON.stringify(records, null, 2), 'mileage_records.json', 'application/json');
  } catch (e) {
    statusEl.innerHTML = `<span class="error">エラー: ${e.message}</span>`;
  }
});

document.getElementById('btn-csv').addEventListener('click', async () => {
  try {
    const records = await fetchAll();
    const header  = ['id','date','dateEnd','type','startOdometer','endOdometer','distance','route','memo'];
    const rows    = records.map(r =>
      header.map(k => `"${String(r[k] ?? '').replace(/"/g, '""')}"`).join(',')
    );
    download('\uFEFF' + [header.join(','), ...rows].join('\r\n'), 'mileage_records.csv', 'text/csv');
  } catch (e) {
    statusEl.innerHTML = `<span class="error">エラー: ${e.message}</span>`;
  }
});
</script>
</body>
</html>
